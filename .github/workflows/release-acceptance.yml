name: Release Acceptance

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install root dependencies and bootstrap planes
        run: bash scripts/bootstrap_founderos_local.sh

      - name: Build monorepo
        run: npm run build

      - name: Run monorepo typechecks
        run: npm run typecheck

      - name: Run shared contract regressions
        run: |
          python -m pip install pytest -e ./founderos_contracts
          python -m pytest founderos_contracts/tests -q

      - name: Run release contract regressions
        run: npm run test:release-contract

      - name: Run web smoke tests
        run: npm --workspace @founderos/web run test

      - name: Run Quorum backend tests
        run: npm --workspace @founderos/quorum-api run test

      - name: Run Autopilot backend tests
        run: npm --workspace @founderos/autopilot-api run test
