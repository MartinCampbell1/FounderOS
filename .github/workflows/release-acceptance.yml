name: Release Acceptance

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - codex/frontend-backend-hygiene
  workflow_dispatch:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install root dependencies and bootstrap planes
        run: bash scripts/bootstrap_founderos_local.sh

      - name: Build monorepo
        run: npm run build

      - name: Run monorepo fast verification
        run: npm run verify:fast

      - name: Run shared contract regressions
        run: |
          python3 -m pip install pytest -e ./founderos_contracts
          python3 -m pytest founderos_contracts/tests -q

      - name: Run release contract regressions
        run: npm run test:release-contract

      - name: Run web smoke tests
        run: npm --workspace @founderos/web run test

      - name: Run Quorum backend tests
        id: quorum_backend
        continue-on-error: true
        run: |
          set +e
          mkdir -p .ci-artifacts/release-acceptance/quorum
          node scripts/run-ci-test-step.mjs \
            --name "Quorum backend tests" \
            --artifactDir ".ci-artifacts/release-acceptance/quorum" \
            --command "npm --workspace @founderos/quorum-api run test"
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Upload Quorum backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-acceptance-quorum-backend
          path: .ci-artifacts/release-acceptance/quorum
          if-no-files-found: error
          retention-days: 14

      - name: Run Autopilot backend tests
        id: autopilot_backend
        continue-on-error: true
        run: |
          set +e
          mkdir -p .ci-artifacts/release-acceptance/autopilot
          node scripts/run-ci-test-step.mjs \
            --name "Autopilot backend tests" \
            --artifactDir ".ci-artifacts/release-acceptance/autopilot" \
            --command "npm --workspace @founderos/autopilot-api run test"
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Upload Autopilot backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-acceptance-autopilot-backend
          path: .ci-artifacts/release-acceptance/autopilot
          if-no-files-found: error
          retention-days: 14

      - name: Finalize backend test gate
        if: always()
        run: |
          quorum_exit="${{ steps.quorum_backend.outputs.exit_code || '0' }}"
          autopilot_exit="${{ steps.autopilot_backend.outputs.exit_code || '0' }}"

          if [ "$quorum_exit" != "0" ] || [ "$autopilot_exit" != "0" ]; then
            echo "One or more backend test steps failed."
            echo "Quorum exit code: $quorum_exit"
            echo "Autopilot exit code: $autopilot_exit"
            exit 1
          fi
